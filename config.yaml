# WorldQuant Brain 自动化配置

# 认证信息 (建议使用环境变量)
auth:
  username: ${WQB_USERNAME}
  password: ${WQB_PASSWORD}

# 交易设置
trading:
  region: USA  # USA, CHN, EUR, JPN, TWN, KOR, GBR, DEU
  universe: TOP3000  # TOP100, TOP200, TOP500, TOP1000, TOP2000, TOP3000
  delay: 1  # 0 或 1

# 提交标准
criteria:
  # ATOMs (简单 Alpha)
  atom:
    min_sharpe: 1.0
    min_fitness: 0.6
    max_turnover: 0.8
    max_drawdown: 0.15

  # Regular Alphas
  regular:
    min_sharpe: 1.25
    min_fitness: 0.7
    max_turnover: 0.7
    max_drawdown: 0.1

  # Power Pool Alphas (高潜力)
  power_pool:
    min_sharpe: 1.5
    min_fitness: 0.8
    max_turnover: 0.6
    max_drawdown: 0.08

  # SuperAlphas (组合 Alpha)
  superalpha:
    min_sharpe: 1.75
    min_fitness: 0.85
    max_turnover: 0.5
    max_drawdown: 0.05

# 生成数量
generation:
  atoms: 10
  regular: 10
  power_pool: 10
  superalphas: 5

# 其他设置
settings:
  auto_submit: true
  check_correlation: true
  max_correlation: 0.7
  results_dir: "./results"
  log_level: INFO
